<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ảnh của tôi</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; color: white; font-family: Arial, sans-serif; }
    h1 { text-align: center; padding: 30px; font-size: 2rem; color: #f0a500; }
    .gallery {
      display: flex;
      justify-content: center;
      padding: 20px;
    }
    .gallery img {
      width: 500px;
      height: 500px;
      object-fit: cover;
      border-radius: 15px;
    }
  </style>
</head>
<body>
  <h1>📸 Ảnh của tôi</h1>
  <div class="gallery">
    <img src="anh.jpg">
  </div>
</body>
</html>
