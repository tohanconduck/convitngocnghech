<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✨ Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Raleway:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root { --neon: #ff6ec7; --neon2: #7ef9ff; --gold: #ffd700; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { min-height: 100vh; background: #000; font-family: 'Raleway', sans-serif; overflow-x: hidden; cursor: none; }

    .cursor { position: fixed; width: 20px; height: 20px; background: var(--neon); border-radius: 50%; pointer-events: none; z-index: 9999; mix-blend-mode: screen; box-shadow: 0 0 15px var(--neon), 0 0 30px var(--neon); transition: transform 0.1s; }

    canvas { position: fixed; top: 0; left: 0; z-index: 0; }

    .container { position: relative; z-index: 10; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }

    h1 { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 6vw, 4rem); color: transparent; background: linear-gradient(90deg, var(--neon), var(--neon2), var(--gold), var(--neon)); background-size: 300%; -webkit-background-clip: text; background-clip: text; animation: shimmer 4s linear infinite; text-align: center; margin-bottom: 10px; letter-spacing: 4px; }
    .subtitle { font-weight: 300; font-size: 0.85rem; letter-spacing: 8px; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 50px; }
    @keyframes shimmer { 0% { background-position: 0% } 100% { background-position: 300% } }

    .photo-wrapper { position: relative; display: inline-block; animation: floatUp 3s ease-in-out infinite alternate; }
    @keyframes floatUp { from { transform: translateY(0px) rotate(-1deg); } to { transform: translateY(-15px) rotate(1deg); } }

    .photo-frame { position: relative; padding: 4px; background: linear-gradient(135deg, var(--neon), var(--neon2), var(--gold), var(--neon)); background-size: 300%; animation: shimmer 3s linear infinite; border-radius: 20px; box-shadow: 0 0 30px var(--neon), 0 0 60px rgba(126,249,255,0.3); }
    .photo-frame img { display: block; width: min(420px, 85vw); height: min(520px, 85vw); object-fit: cover; border-radius: 17px; filter: brightness(1.05) contrast(1.05) saturate(1.1); }

    .orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.15; z-index: 1; animation: orbMove 8s ease-in-out infinite alternate; }
    .orb1 { width: 400px; height: 400px; background: var(--neon); top: -100px; left: -100px; }
    .orb2 { width: 350px; height: 350px; background: var(--neon2); bottom: -100px; right: -100px; animation-delay: -4s; }
    @keyframes orbMove { from { transform: translate(0,0) scale(1); } to { transform: translate(30px,30px) scale(1.1); } }

    .particle { position: fixed; pointer-events: none; z-index: 2; animation: rise linear infinite; opacity: 0; }
    @keyframes rise { 0% { transform: translateY(100vh) scale(0); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-10vh) scale(1); opacity: 0; } }

    /* REACTION BAR */
    .reaction-bar { margin-top: 30px; background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 50px; padding: 12px 24px; display: flex; gap: 8px; align-items: center; }

    .reaction-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; cursor: pointer; padding: 8px 12px; border-radius: 30px; transition: all 0.2s; }
    .reaction-btn:hover { background: rgba(255,255,255,0.1); transform: scale(1.2) translateY(-5px); }
    .reaction-btn .emoji { font-size: 2rem; display: block; transition: transform 0.2s; }
    .reaction-btn:active .emoji { transform: scale(1.5); }
    .reaction-btn .count { font-size: 0.75rem; color: rgba(255,255,255,0.6); font-family: 'Raleway', sans-serif; min-width: 20px; text-align: center; }

    /* Floating reaction */
    .float-emoji { position: fixed; pointer-events: none; z-index: 999; animation: floatAway 1.2s ease-out forwards; }
    @keyframes floatAway { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-150px) scale(2); opacity: 0; } }

    /* DUCK */
    .duck { position: fixed; pointer-events: auto; z-index: 5; cursor: pointer; user-select: none; animation: duckFly linear infinite; }
    .duck:hover { filter: brightness(1.5); }
    @keyframes duckFly {
      0%   { transform: translateX(-120px) translateY(0px); }
      25%  { transform: translateX(25vw) translateY(-30px); }
      50%  { transform: translateX(50vw) translateY(10px); }
      75%  { transform: translateX(75vw) translateY(-20px); }
      100% { transform: translateX(110vw) translateY(0px); }
    }

    .tag { margin-top: 30px; font-size: 0.75rem; letter-spacing: 6px; color: rgba(255,255,255,0.25); text-transform: uppercase; }
  </style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<canvas id="stars"></canvas>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="container">
  <h1>✦ Ảnh Của Tôi ✦</h1>
  <p class="subtitle">my gallery &nbsp;·&nbsp; 2024</p>

  <div class="photo-wrapper">
    <div class="photo-frame">
      <img src="anh.jpg" alt="Photo">
    </div>
  </div>

  <div class="reaction-bar">
    <button class="reaction-btn" data-emoji="❤️" onclick="react(this, event)">
      <span class="emoji">❤️</span><span class="count">0</span>
    </button>
    <button class="reaction-btn" data-emoji="😂" onclick="react(this, event)">
      <span class="emoji">😂</span><span class="count">0</span>
    </button>
    <button class="reaction-btn" data-emoji="😮" onclick="react(this, event)">
      <span class="emoji">😮</span><span class="count">0</span>
    </button>
    <button class="reaction-btn" data-emoji="😢" onclick="react(this, event)">
      <span class="emoji">😢</span><span class="count">0</span>
    </button>
    <button class="reaction-btn" data-emoji="😡" onclick="react(this, event)">
      <span class="emoji">😡</span><span class="count">0</span>
    </button>
    <button class="reaction-btn" data-emoji="🥰" onclick="react(this, event)">
      <span class="emoji">🥰</span><span class="count">0</span>
    </button>
    <button class="reaction-btn" data-emoji="👏" onclick="react(this, event)">
      <span class="emoji">👏</span><span class="count">0</span>
    </button>
  </div>

  <p class="tag">✦ &nbsp; made with love &nbsp; ✦</p>
</div>

<script>
  // Cursor
  const cursor = document.getElementById('cursor');
  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX - 10 + 'px';
    cursor.style.top  = e.clientY - 10 + 'px';
  });

  // Stars
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; initStars(); });
  let stars = [];
  function initStars() {
    stars = Array.from({length: 180}, () => ({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*1.5+0.3, a: Math.random(), speed: Math.random()*0.008+0.002, dir: Math.random()>0.5?1:-1 }));
  }
  initStars();
  function drawStars() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    stars.forEach(s => { s.a+=s.speed*s.dir; if(s.a>1||s.a<0) s.dir*=-1; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fillStyle=`rgba(255,255,255,${s.a})`; ctx.fill(); });
    requestAnimationFrame(drawStars);
  }
  drawStars();

  // Star particles
  const symbols = ['✦','✧','⋆','❋','✺'];
  function spawnParticle() {
    const p = document.createElement('div');
    p.classList.add('particle');
    p.textContent = symbols[Math.floor(Math.random()*symbols.length)];
    p.style.left = Math.random()*100+'vw';
    p.style.fontSize = (0.6+Math.random()*1.2)+'rem';
    p.style.color = ['#ff6ec7','#7ef9ff','#ffd700','#fff'][Math.floor(Math.random()*4)];
    const dur = 6+Math.random()*8;
    p.style.animationDuration = dur+'s';
    p.style.animationDelay = Math.random()*3+'s';
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),(dur+3)*1000);
  }
  setInterval(spawnParticle, 400);

  // REACTION - nhấn nhiều lần được
  function react(btn, e) {
    const countEl = btn.querySelector('.count');
    countEl.textContent = parseInt(countEl.textContent) + 1;

    // Float emoji lên
    const floater = document.createElement('div');
    floater.classList.add('float-emoji');
    floater.textContent = btn.dataset.emoji;
    floater.style.left = (e.clientX - 16) + 'px';
    floater.style.top  = (e.clientY - 10) + 'px';
    floater.style.fontSize = (1.5 + Math.random()) + 'rem';
    document.body.appendChild(floater);
    setTimeout(() => floater.remove(), 1200);
  }

  // DUCKS BAY
  const duckEmojis = ['🦆','🐥','🐤','🐣'];
  function spawnDuck() {
    const duck = document.createElement('div');
    duck.classList.add('duck');
    duck.textContent = duckEmojis[Math.floor(Math.random()*duckEmojis.length)];
    duck.style.top = (10 + Math.random() * 80) + 'vh';
    duck.style.fontSize = (1.5 + Math.random() * 2) + 'rem';
    const dur = 5 + Math.random() * 8;
    duck.style.animationDuration = dur + 's';
    duck.style.animationDelay = '0s';

    // Click vịt thì nổ
    duck.onclick = () => {
      duck.textContent = '💥';
      duck.style.transition = 'transform 0.2s';
      duck.style.transform += ' scale(2)';
      setTimeout(() => duck.remove(), 400);
    };

    document.body.appendChild(duck);
    setTimeout(() => duck.remove(), (dur + 1) * 1000);
  }

  // Spawn vịt liên tục
  setInterval(spawnDuck, 1200);
  // Spawn vài con lúc đầu luôn
  for(let i = 0; i < 4; i++) setTimeout(spawnDuck, i * 400);
</script>
</body>
</html>
