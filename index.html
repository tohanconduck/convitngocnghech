<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Good Luck 🍀</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
height:100vh;overflow:hidden;
display:flex;justify-content:center;align-items:center;
background:linear-gradient(to bottom,#05102b,#152b73);
font-family:'Segoe UI',sans-serif;
}
.star{
position:absolute;width:2px;height:2px;background:white;border-radius:50%;
animation:twinkle 2s infinite;
}
@keyframes twinkle{50%{opacity:.2}}

.moon{
position:absolute;top:50px;right:70px;
width:110px;height:110px;border-radius:50%;
background:#fff7d1;
box-shadow:0 0 40px #fff;
}

.home{text-align:center;color:white}

.envelope{
width:300px;height:190px;
background:#f5f5f5;
border-radius:12px;
position:relative;
box-shadow:0 0 30px rgba(255,255,255,.4);
animation:float 3s ease-in-out infinite;
}

.envelope:before{
content:'';
position:absolute;
top:0;
left:0;
border-left:150px solid transparent;
border-right:150px solid transparent;
border-top:95px solid #dddddd;
}

@keyframes float{
50%{transform:translateY(-10px)}
}

button{
margin-top:25px;
padding:14px 40px;
border:none;
border-radius:50px;
font-size:22px;
font-weight:bold;
cursor:pointer;
background:linear-gradient(135deg,#ffd5ea,#fff);
box-shadow:0 0 20px pink;
}

.letter{
display:none;
width:90%;
max-width:900px;
background:linear-gradient(#fffef8,#fff3d1);
padding:45px;
border-radius:20px;
border:3px solid gold;
box-shadow:0 0 40px rgba(255,215,0,.4);
line-height:2;
font-size:22px;
color:#333;
}

h2{
text-align:center;
color:#c28700;
margin-bottom:20px;
}

.butterfly{
position:absolute;
font-size:28px;
animation:fly 4s linear forwards;
}

@keyframes fly{
to{
opacity:0;
transform:translateY(-500px) translateX(var(--x)) rotate(360deg);
}
}
</style>
</head>
<body>

<div class="moon"></div>

<div class="home" id="home">
<div class="envelope"></div>
<button onclick="openLetter()">MỞ THƯ 💌</button>
<p style="margin-top:12px">📩 Có một bức thư đang đợi cậu...</p>
</div>

<div class="letter" id="letter">
<h2>🍀🍀🍀</h2>
<p id="text"></p>
</div>

<script>
for(let i=0;i<180;i++){
let s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";
s.style.animationDelay=Math.random()*2+"s";
document.body.appendChild(s);
}

const msg=`

Chúc Nhi ngày mai thi tốt nhe`;

function openLetter(){

for(let i=0;i<25;i++){
let b=document.createElement("div");
b.className="butterfly";
b.innerHTML="🦋";
b.style.left=(window.innerWidth/2)+"px";
b.style.top=(window.innerHeight/2)+"px";
b.style.setProperty("--x",(Math.random()*800-400)+"px");
document.body.appendChild(b);
setTimeout(()=>b.remove(),4000);
}

document.getElementById("home").style.display="none";
document.getElementById("letter").style.display="block";

let i=0;
function type(){
if(i<msg.length){
document.getElementById("text").innerHTML+=msg.charAt(i);
i++;
setTimeout(type,20);
}
}
type();
}
</script>

</body>
</html>
